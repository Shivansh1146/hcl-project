<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Review Assistant</title>
    <meta name="description" content="AI-powered GitHub PR code review assistant frontend interface.">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Code Review Assistant</h1>
            <p class="subtitle">Enter PR Details to run an automated code review</p>
        </header>

        <main>
            <div class="card">
                <form id="review-form">
                    <div class="form-group">
                        <label for="repo">Repository (owner/repo)</label>
                        <input type="text" id="repo" name="repo" placeholder="e.g., octocat/Hello-World" required>
                    </div>
                    <div class="form-group">
                        <label for="pr-number">Pull Request Number</label>
                        <input type="number" id="pr-number" name="pr-number" placeholder="e.g., 42" required>
                    </div>
                    <button type="submit" id="submit-btn">
                        <span class="btn-text">Run Review</span>
                        <div class="spinner hidden"></div>
                    </button>
                </form>
            </div>

            <div id="results-container" class="card hidden">
                <h2>Review Results</h2>
                <div id="results-content"></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
